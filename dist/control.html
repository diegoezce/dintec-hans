<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Robot Control — Hans Elfin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1f2e;
      border: 1px solid #2d3448;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 28px;
    }

    .section {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input, select {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3448;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      border-color: #3b82f6;
    }

    select option {
      background: #1a1f2e;
    }

    .btn {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 16px;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-load {
      background: #1e3a5f;
      color: #60a5fa;
      border: 1px solid #2d5a8e;
    }

    .btn-start {
      background: #14532d;
      color: #4ade80;
      border: 1px solid #166534;
      flex: 1;
      padding: 16px;
      font-size: 16px;
      border-radius: 10px;
    }

    .btn-stop {
      background: #7f1d1d;
      color: #f87171;
      border: 1px solid #991b1b;
      flex: 1;
      padding: 16px;
      font-size: 16px;
      border-radius: 10px;
    }

    .btn-pause {
      background: #713f12;
      color: #fbbf24;
      border: 1px solid #92400e;
      padding: 12px 20px;
      border-radius: 10px;
    }

    .btn-continue {
      background: #1e3a5f;
      color: #60a5fa;
      border: 1px solid #2d5a8e;
      padding: 12px 20px;
      border-radius: 10px;
    }

    .controls-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .secondary-row {
      display: flex;
      gap: 10px;
    }

    .status-box {
      background: #0f1117;
      border: 1px solid #2d3448;
      border-radius: 10px;
      padding: 16px;
      margin-top: 24px;
    }

    .status-header {
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-idle    { background: #475569; }
    .dot-running { background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: pulse 1.5s infinite; }
    .dot-paused  { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; }
    .dot-error   { background: #f87171; box-shadow: 0 0 8px #f87171; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .status-text {
      font-size: 14px;
      color: #cbd5e1;
    }

    .status-program {
      font-size: 12px;
      color: #64748b;
    }

    .log {
      margin-top: 12px;
      font-size: 11px;
      color: #64748b;
      max-height: 80px;
      overflow-y: auto;
      line-height: 1.6;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .log .ok   { color: #4ade80; }
    .log .err  { color: #f87171; }
    .log .info { color: #60a5fa; }

    .divider {
      border: none;
      border-top: 1px solid #2d3448;
      margin: 24px 0;
    }

    .var-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0f1117;
      border: 1px solid #2d3448;
      border-radius: 10px;
      padding: 14px 18px;
      margin-top: 12px;
    }

    .var-label {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid #2d3448;
      color: #64748b;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-reset:hover { color: #f1f5f9; border-color: #475569; }
    .btn-reset:disabled { opacity: 0.3; cursor: not-allowed; }

    .var-value {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      font-family: "SF Mono", "Fira Code", monospace;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Robot Control</h1>
  <p class="subtitle">Hans Robot Elfin E12 — Standalone Controller</p>

  <!-- IP Configuration -->
  <div class="section">
    <label>Controller IP</label>
    <div class="input-row">
      <input type="text" id="ipInput" value="192.168.10.10" placeholder="e.g. 192.168.1.100" />
    </div>
  </div>

  <!-- Program Selection -->
  <div class="section">
    <label>Program</label>
    <div class="input-row">
      <input type="text" id="programInput" placeholder="Program name or load from robot" />
      <button class="btn btn-load" id="btnLoad" onclick="loadPrograms()">Load list</button>
    </div>
    <select id="programSelect" style="display:none; margin-top:8px; width:100%;" onchange="selectProgram(this.value)">
      <option value="">— select a program —</option>
    </select>
  </div>

  <hr class="divider" />

  <!-- Main Controls -->
  <div class="controls-row">
    <button class="btn btn-start" id="btnStart" onclick="startProgram()">▶ START</button>
    <button class="btn btn-stop"  id="btnStop"  onclick="stopProgram()">■ STOP</button>
  </div>

  <div class="secondary-row">
    <button class="btn btn-pause"    id="btnPause"    onclick="pauseProgram()">⏸ Pause</button>
    <button class="btn btn-continue" id="btnContinue" onclick="continueProgram()">▶▶ Continue</button>
  </div>

  <!-- Variable display -->
  <div class="section" style="margin-top:16px; margin-bottom:0;">
    <label>Variable</label>
    <div class="input-row">
      <select id="varSelect" onchange="selectVar(this.value)" style="flex:1;">
        <option value="">— load variables from robot —</option>
      </select>
      <button class="btn btn-load" id="btnLoadVars" onclick="loadVarList()">Load vars</button>
    </div>
  </div>
  <div class="var-box">
    <div class="var-label" id="varNameLabel">—</div>
    <div class="var-value" id="varContapalet">—</div>
    <button class="btn btn-reset" id="btnReset" onclick="resetVar()" title="Reset to 0">↺</button>
  </div>

  <!-- Status -->
  <div class="status-box">
    <div class="status-header">Status</div>
    <div class="status-row">
      <div class="dot dot-idle" id="statusDot"></div>
      <div>
        <div class="status-text" id="statusText">Idle</div>
        <div class="status-program" id="statusProgram">—</div>
      </div>
    </div>
    <div class="log" id="log"></div>
  </div>
</div>

<script>
  const PORT = 7001;

  function getBase() {
    const ip = document.getElementById('ipInput').value.trim();
    return `http://${ip}:${PORT}`;
  }

  // Core call wrapper (mirrors RobotData/index.html pattern)
  async function callMachine(payload) {
    const res = await fetch(getBase() + '/api/home/callMachine', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    try { return JSON.parse(text); } catch { return text; }
  }

  // JsonCmd wrapper (matches the app's `so()` function)
  async function jsonCmd(cmdname, parameters = [], task = []) {
    const inner = JSON.stringify({ cmdname, parameters, task });
    const result = await callMachine({ mname: 'JsonCmd', objparam: [0, 0, inner] });
    const parsed = typeof result === 'string' ? JSON.parse(result) : result;
    if (Array.isArray(parsed)) {
      const inner2 = JSON.parse(parsed[0]);
      return inner2;
    }
    return parsed;
  }

  function log(msg, type = 'info') {
    const el = document.getElementById('log');
    const time = new Date().toLocaleTimeString();
    el.innerHTML += `<span class="${type}">[${time}] ${msg}</span>\n`;
    el.scrollTop = el.scrollHeight;
  }

  function setStatus(state, program = '') {
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    const prog = document.getElementById('statusProgram');

    dot.className = 'dot';
    if (state === 'running') { dot.classList.add('dot-running'); text.textContent = 'Running'; }
    else if (state === 'paused') { dot.classList.add('dot-paused'); text.textContent = 'Paused'; }
    else if (state === 'error')  { dot.classList.add('dot-error');  text.textContent = 'Error'; }
    else { dot.classList.add('dot-idle'); text.textContent = 'Idle'; }

    prog.textContent = program || '—';
  }

  // ── Load program list ──────────────────────────────────────────
  async function loadPrograms() {
    const btn = document.getElementById('btnLoad');
    btn.disabled = true;
    btn.textContent = 'Loading…';
    try {
      const { errorcode, results } = await jsonCmd('ReadProgramNameList', []);
      if (errorcode !== '0' && errorcode !== 0) throw new Error(`errorcode ${errorcode}`);

      const programs = results.filter(Boolean).map(p => typeof p === 'object' ? (p.Name || p.name || JSON.stringify(p)) : p);
      const sel = document.getElementById('programSelect');
      sel.innerHTML = '<option value="">— select a program —</option>';
      programs.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        sel.appendChild(opt);
      });
      sel.style.display = 'block';
      log(`Loaded ${programs.length} program(s)`, 'ok');
    } catch (e) {
      log(`Failed to load programs: ${e.message}`, 'err');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Load list';
    }
  }

  function selectProgram(name) {
    if (name) document.getElementById('programInput').value = name;
  }

  // ── START ──────────────────────────────────────────────────────
  async function startProgram() {
    const programName = document.getElementById('programInput').value.trim();
    if (!programName) { log('Enter a program name first', 'err'); return; }

    const btn = document.getElementById('btnStart');
    btn.disabled = true;
    log(`Starting "${programName}"…`, 'info');

    try {
      const { errorcode } = await jsonCmd('RunScriptInEditor', [{ Name: programName, DebugMode: '0' }]);
      if (errorcode !== '0' && errorcode !== 0) throw new Error(`errorcode ${errorcode}`);
      programRunning = true;
      log('Program started', 'ok');
      setStatus('running', programName);
    } catch (e) {
      log(`Start failed: ${e.message}`, 'err');
      setStatus('error');
    } finally {
      btn.disabled = false;
    }
  }

  // ── STOP ───────────────────────────────────────────────────────
  async function stopProgram() {
    const btn = document.getElementById('btnStop');
    btn.disabled = true;
    log('Stopping…', 'info');
    try {
      const result = await callMachine({ mname: 'StopScript', objparam: [0, 0] });
      const code = Array.isArray(result) ? result[0] : result?.data ?? result;
      if (code !== 0 && code !== '0') throw new Error(`code ${code}`);
      programRunning = false;
      log('Program stopped', 'ok');
      setStatus('idle');
    } catch (e) {
      log(`Stop failed: ${e.message}`, 'err');
    } finally {
      btn.disabled = false;
    }
  }

  // ── PAUSE ──────────────────────────────────────────────────────
  async function pauseProgram() {
    const btn = document.getElementById('btnPause');
    btn.disabled = true;
    try {
      await callMachine({ mname: 'PauseScript', objparam: [0, 0] });
      log('Program paused', 'ok');
      const prog = document.getElementById('statusProgram').textContent;
      setStatus('paused', prog !== '—' ? prog : '');
    } catch (e) {
      log(`Pause failed: ${e.message}`, 'err');
    } finally {
      btn.disabled = false;
    }
  }

  // ── CONTINUE ───────────────────────────────────────────────────
  async function continueProgram() {
    const btn = document.getElementById('btnContinue');
    btn.disabled = true;
    try {
      await callMachine({ mname: 'ContinueScript', objparam: [0, 0] });
      log('Program resumed', 'ok');
      const prog = document.getElementById('statusProgram').textContent;
      setStatus('running', prog !== '—' ? prog : '');
    } catch (e) {
      log(`Continue failed: ${e.message}`, 'err');
    } finally {
      btn.disabled = false;
    }
  }

  // ── Polling: read running script status every 3s ───────────────
  async function pollStatus() {
    try {
      const { errorcode, results } = await jsonCmd('ReadScriptInRuntime');
      if (errorcode === '0' && results && results[0] && results[0] !== '') {
        const info = results[0];
        const programName = info.scriptName || info.name || document.getElementById('programInput').value || 'Unknown';
        if (document.getElementById('statusDot').classList.contains('dot-idle')) {
          setStatus('running', programName);
        }
      } else {
        if (document.getElementById('statusDot').classList.contains('dot-running')) {
          setStatus('idle');
        }
      }
    } catch (_) { /* silent — robot might not be connected yet */ }
  }

  // ── Real-time variables via raw WebSocket (socket.io protocol) ──
  let rawWs = null;
  let wsEio = 4;
  let wsReconnectTimer = null;
  let varPollTimer = null;
  let watchedVar = '';
  let programRunning = false;

  function connectRawSocket() {
    if (rawWs) { rawWs.onclose = null; rawWs.close(); rawWs = null; }
    if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
    const ip = document.getElementById('ipInput').value.trim();
    openWs(ip, wsEio);
  }

  function openWs(ip, eio) {
    const ws = new WebSocket(`ws://${ip}:7001/socket.io/?EIO=${eio}&transport=websocket`);
    rawWs = ws;

    ws.onopen = () => {
      if (eio === 4) ws.send('40'); // socket.io v3/v4: send CONNECT packet
    };

    ws.onmessage = ({ data }) => {
      if (data === '2') { ws.send('3'); return; }         // PING → PONG
      if (data.startsWith('40')) {
        log('Socket connected', 'ok');
        // Start polling as backup in case hrscript/vars never fires
        startVarPolling();
        return;
      }
      if (data.startsWith('42')) {
        try {
          const [event, payload] = JSON.parse(data.slice(2));
          if (event === 'RTInfo/Script' && payload) {
            // Sync running state from robot in real time
            const running = Array.isArray(payload.cmdid) && payload.cmdid.some(id => id !== '');
            if (running !== programRunning) {
              programRunning = running;
              if (running) {
                const prog = document.getElementById('programInput').value || '';
                setStatus('running', prog);
              } else {
                setStatus('idle');
              }
            }
            if (programRunning && watchedVar && payload.GlobalVar) {
              const entry = payload.GlobalVar.find(o => watchedVar in o);
              if (entry) {
                document.getElementById('varContapalet').textContent = entry[watchedVar];
              }
            }
          }
        } catch (_) {}
      }
    };

    ws.onerror = () => {
      if (eio === 4) { wsEio = 3; openWs(ip, 3); } // retry with v2 protocol
      else { log('WebSocket failed — polling every 2s', 'info'); startVarPolling(); }
    };

    ws.onclose = () => {
      wsReconnectTimer = setTimeout(() => {
        const currentIp = document.getElementById('ipInput').value.trim();
        openWs(currentIp, wsEio);
      }, 4000);
    };
  }

  let varObjects = {}; // full variable objects keyed by Name, needed for safe UpdateVar

  async function loadVarList() {
    const programName = document.getElementById('programInput').value.trim();
    if (!programName) { log('Select a program first', 'err'); return; }

    const btn = document.getElementById('btnLoadVars');
    btn.disabled = true;
    btn.textContent = 'Loading…';
    try {
      const { errorcode, results } = await jsonCmd('ReadVar', [{ PageNum: '0', PageSize: '0' }]);
      if (errorcode !== '0' && errorcode !== 0) throw new Error(`errorcode ${errorcode}`);
      const vars = results.slice(1).filter(v => v && (v.Name || v.name));
      if (!vars.length) throw new Error('no variables found in program');

      varObjects = {};
      vars.forEach(v => { varObjects[v.Name] = v; });

      const sel = document.getElementById('varSelect');
      sel.innerHTML = '<option value="">— select variable —</option>';
      vars.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.Name;
        opt.textContent = `${v.Name} (${v.VarType})`;
        sel.appendChild(opt);
      });
      log(`Loaded ${vars.length} variable(s) from "${programName}"`, 'ok');
    } catch (e) {
      log(`Failed to load variables: ${e.message}`, 'err');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Load vars';
    }
  }

  function selectVar(name) {
    if (!name) return;
    watchedVar = name;
    document.getElementById('varNameLabel').textContent = name;
    document.getElementById('varContapalet').textContent = '—';
  }

  async function resetVar() {
    if (!watchedVar) { log('Select a variable first', 'err'); return; }
    const btn = document.getElementById('btnReset');
    btn.disabled = true;
    try {
      const wasRunning = document.getElementById('statusDot').classList.contains('dot-running');
      programRunning = false;
      if (wasRunning) {
        await callMachine({ mname: 'StopScript', objparam: [0, 0] });
        await new Promise(r => setTimeout(r, 400));
        setStatus('idle');
      }
      // Only reset the display — stored initial value in the program stays unchanged
      document.getElementById('varContapalet').textContent = '0';
      log(`Reset ${watchedVar} → 0`, 'ok');
    } catch (e) {
      log(`Reset failed: ${e.message}`, 'err');
    } finally {
      btn.disabled = false;
    }
  }

  function startVarPolling() {
    if (varPollTimer) return;
    varPollTimer = setInterval(async () => {
      if (!watchedVar) return;
      try {
        if (!programRunning) return;
        const { errorcode, results } = await jsonCmd('ReadVar', [{ PageNum: '0', PageSize: '0' }]);
        if ((errorcode === '0' || errorcode === 0) && Array.isArray(results)) {
          const match = results.find(r => r && (r.Name || r.name) === watchedVar);
          if (match) {
            const val = match.VarValue ?? match.Value ?? match.value ?? '?';
            document.getElementById('varContapalet').textContent = val;
          }
        }
      } catch (_) {}
    }, 2000);
  }

  // Connect on load and whenever IP changes
  document.getElementById('ipInput').addEventListener('change', () => {
    if (varPollTimer) { clearInterval(varPollTimer); varPollTimer = null; }
    wsEio = 4;
    connectRawSocket();
  });
  connectRawSocket();

  // Start polling
  setInterval(pollStatus, 3000);
</script>
</body>
</html>
